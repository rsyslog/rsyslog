# Drop container noise before packaged outputs process it.
# Replace /etc/rsyslog/noise-drop.lkp_tbl with a native regex lookup table.
lookup_table(name="container_noise"
	file="/etc/rsyslog/noise-drop.lkp_tbl"
	reloadOnHUP="on")

set $.container_noise_tag = lookup("container_noise", $rawmsg);
if (strlen($.container_noise_tag) > 0) then {
	stop
}
