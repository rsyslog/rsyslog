receivers:
  otlp:
    protocols:
      http:
        endpoint: ${OTEL_COLLECTOR_ENDPOINT}

exporters:
  file:
    path: ${OTEL_OUTPUT_FILE}
    format: json
    flush_interval: 1s

service:
  telemetry:
    metrics:
      address: ${OTEL_METRICS_ENDPOINT}
  pipelines:
    logs:
      receivers: [otlp]
      exporters: [file]
