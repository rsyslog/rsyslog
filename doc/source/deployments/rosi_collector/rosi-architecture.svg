<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="600" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">ROSI Collector Architecture</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#7f8c8d">RSyslog Open System for Information</text>
  
  <!-- Client Hosts Section -->
  <rect x="30" y="80" width="240" height="480" rx="10" fill="#e8f4f8" stroke="#3498db" stroke-width="2"/>
  <text x="150" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="#2980b9">Client Hosts</text>
  
  <!-- Client 1 -->
  <rect x="50" y="130" width="200" height="100" rx="8" fill="#fff" stroke="#bdc3c7" stroke-width="1"/>
  <text x="150" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#34495e">Client Host 1</text>
  <rect x="70" y="170" width="160" height="25" rx="4" fill="#27ae60" opacity="0.9"/>
  <text x="150" y="187" text-anchor="middle" font-size="11" fill="#fff">rsyslog</text>
  <rect x="70" y="200" width="160" height="20" rx="4" fill="#9b59b6" opacity="0.9"/>
  <text x="150" y="214" text-anchor="middle" font-size="10" fill="#fff">node_exporter :9100</text>
  
  <!-- Client 2 -->
  <rect x="50" y="250" width="200" height="100" rx="8" fill="#fff" stroke="#bdc3c7" stroke-width="1"/>
  <text x="150" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#34495e">Client Host 2</text>
  <rect x="70" y="290" width="160" height="25" rx="4" fill="#27ae60" opacity="0.9"/>
  <text x="150" y="307" text-anchor="middle" font-size="11" fill="#fff">rsyslog</text>
  <rect x="70" y="320" width="160" height="20" rx="4" fill="#9b59b6" opacity="0.9"/>
  <text x="150" y="334" text-anchor="middle" font-size="10" fill="#fff">node_exporter :9100</text>
  
  <!-- Client N (ellipsis) -->
  <text x="150" y="380" text-anchor="middle" font-size="20" fill="#7f8c8d">⋮</text>
  
  <!-- Client N -->
  <rect x="50" y="400" width="200" height="100" rx="8" fill="#fff" stroke="#bdc3c7" stroke-width="1"/>
  <text x="150" y="425" text-anchor="middle" font-size="13" font-weight="bold" fill="#34495e">Client Host N</text>
  <rect x="70" y="440" width="160" height="25" rx="4" fill="#27ae60" opacity="0.9"/>
  <text x="150" y="457" text-anchor="middle" font-size="11" fill="#fff">rsyslog</text>
  <rect x="70" y="470" width="160" height="20" rx="4" fill="#9b59b6" opacity="0.9"/>
  <text x="150" y="484" text-anchor="middle" font-size="10" fill="#fff">node_exporter :9100</text>
  
  <!-- ROSI Collector Server Section -->
  <rect x="320" y="80" width="550" height="480" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <text x="595" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="#d68910">ROSI Collector Server</text>
  
  <!-- Docker Compose Stack Label -->
  <rect x="340" y="120" width="510" height="420" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="595" y="140" text-anchor="middle" font-size="11" fill="#95a5a6">Docker Compose Stack</text>
  
  <!-- rsyslog Collector -->
  <rect x="360" y="160" width="140" height="80" rx="8" fill="#27ae60"/>
  <text x="430" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">rsyslog</text>
  <text x="430" y="215" text-anchor="middle" font-size="10" fill="#fff">Collector</text>
  <text x="430" y="230" text-anchor="middle" font-size="9" fill="#d5f4e6">:10514 (TCP/UDP)</text>
  
  <!-- Loki -->
  <rect x="560" y="160" width="140" height="80" rx="8" fill="#e74c3c"/>
  <text x="630" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Grafana Loki</text>
  <text x="630" y="215" text-anchor="middle" font-size="10" fill="#fff">Log Storage</text>
  <text x="630" y="230" text-anchor="middle" font-size="9" fill="#fadbd8">:3100</text>
  
  <!-- Arrow: rsyslog to Loki -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9b59b6"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
  </defs>
  
  <line x1="500" y1="200" x2="555" y2="200" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="527" y="192" text-anchor="middle" font-size="9" fill="#34495e">omhttp</text>
  
  <!-- Prometheus -->
  <rect x="360" y="280" width="140" height="80" rx="8" fill="#9b59b6"/>
  <text x="430" y="315" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Prometheus</text>
  <text x="430" y="335" text-anchor="middle" font-size="10" fill="#fff">Metrics</text>
  <text x="430" y="350" text-anchor="middle" font-size="9" fill="#e8daef">:9090</text>
  
  <!-- Grafana -->
  <rect x="560" y="280" width="140" height="80" rx="8" fill="#f39c12"/>
  <text x="630" y="315" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Grafana</text>
  <text x="630" y="335" text-anchor="middle" font-size="10" fill="#fff">Dashboards</text>
  <text x="630" y="350" text-anchor="middle" font-size="9" fill="#fef5e7">:3000</text>
  
  <!-- Arrows to Grafana -->
  <line x1="630" y1="240" x2="630" y2="275" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="500" y1="320" x2="555" y2="320" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Traefik -->
  <rect x="460" y="400" width="180" height="70" rx="8" fill="#3498db"/>
  <text x="550" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Traefik</text>
  <text x="550" y="450" text-anchor="middle" font-size="10" fill="#fff">Reverse Proxy + Auto TLS</text>
  <text x="550" y="465" text-anchor="middle" font-size="9" fill="#d6eaf8">:80, :443</text>
  
  <!-- Arrow: Traefik to Grafana -->
  <path d="M 550 400 Q 550 375 590 360" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead-blue)"/>
  
  <!-- External Access -->
  <rect x="740" y="400" width="110" height="70" rx="8" fill="#1abc9c"/>
  <text x="795" y="425" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Users</text>
  <text x="795" y="445" text-anchor="middle" font-size="10" fill="#fff">HTTPS</text>
  <text x="795" y="460" text-anchor="middle" font-size="9" fill="#d1f2eb">Web Browser</text>
  
  <!-- Arrow: Users to Traefik -->
  <line x1="735" y1="435" x2="645" y2="435" stroke="#1abc9c" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Log Flow Arrow (Client to rsyslog) -->
  <line x1="255" y1="180" x2="355" y2="180" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="305" y="170" text-anchor="middle" font-size="10" fill="#27ae60">Logs</text>
  <text x="305" y="195" text-anchor="middle" font-size="9" fill="#27ae60">TCP :10514</text>
  
  <!-- Metrics Flow Arrow (Prometheus to Clients) -->
  <path d="M 360 320 L 290 320 L 290 215 L 255 215" stroke="#9b59b6" stroke-width="2" fill="none" marker-end="url(#arrowhead-purple)"/>
  <text x="290" y="265" text-anchor="middle" font-size="9" fill="#9b59b6" transform="rotate(-90, 290, 265)">scrape :9100</text>
  
  <!-- Legend -->
  <rect x="30" y="570" width="840" height="25" rx="5" fill="#ecf0f1"/>
  <circle cx="60" cy="582" r="6" fill="#27ae60"/>
  <text x="75" y="587" font-size="10" fill="#34495e">Log Flow</text>
  <circle cx="160" cy="582" r="6" fill="#9b59b6"/>
  <text x="175" y="587" font-size="10" fill="#34495e">Metrics Scrape</text>
  <circle cx="280" cy="582" r="6" fill="#3498db"/>
  <text x="295" y="587" font-size="10" fill="#34495e">HTTPS Proxy</text>
  <rect x="400" y="576" width="12" height="12" rx="2" fill="#f39c12"/>
  <text x="420" y="587" font-size="10" fill="#34495e">Visualization</text>
  <rect x="520" cy="576" width="12" height="12" rx="2" fill="#e74c3c"/>
  <text x="540" y="587" font-size="10" fill="#34495e">Storage</text>
  <text x="650" y="587" font-size="10" fill="#7f8c8d">All traffic encrypted with Let's Encrypt TLS</text>
</svg>
