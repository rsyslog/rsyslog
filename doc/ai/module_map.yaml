# Seed map for AI agents; keep minimal and truthful. Extend over time.
# Per-module metadata (support status, maturity, contacts) lives in each module
# directory as `MODULE_METADATA.yaml`; update both the metadata file and this map
# when concurrency guidance changes.
runtime_queue:
  paths: ["runtime/queue.c", "runtime/queue.h"]
  requires_serialization: true
  notes:
    - Disk-assisted mode is an in-memory parent plus a first-class disk child; disk queue semantics apply to the child.

omfile:
  paths: ["plugins/omfile/"]
  requires_serialization: true
  locks:
    - type: mutex
      field: pData.mutWrite

omfwd:
  paths: ["plugins/omfwd/"]
  requires_serialization: false

omelasticsearch:
  paths: ["plugins/omelasticsearch/"]
  requires_serialization: false

omazureeventhubs:
  paths: ["plugins/omazureeventhubs/"]
  requires_serialization: true
  locks:
    - type: rwlock
      field: pData.pnLock
      writer: rsyslog_worker
      reader: proton_thread

omazuredce:
  paths: ["plugins/omazuredce/"]
  requires_serialization: true
  locks:
    - type: mutex
      field: pWrkrData.batchLock
  notes:
    - Each worker owns its batch buffer and timer thread; access is serialized by batchLock.

contrib_omhttp:
  paths: ["contrib/omhttp/"]
  requires_serialization: false

contrib_mmkubernetes:
  paths: ["contrib/mmkubernetes/"]
  requires_serialization: false
  notes:
    - WID is per-thread; shared caches in pData must be guarded.

mmsnareparse:
  paths: ["plugins/mmsnareparse/"]
  requires_serialization: false
  notes:
    - Parsing logic does not maintain shared mutable state.

ommysql:
  paths: ["plugins/ommysql/"]
  requires_serialization: false
  notes:
    - Per-worker MYSQL handle in pWrkrData; no module-level RW lock required after refactor.

mmjsontransform:
  paths: ["plugins/mmjsontransform/"]
  requires_serialization: false
  notes:
    - Rewrites JSON trees per message without shared mutable state.

mmjsonrewrite:
  paths: ["plugins/mmjsonrewrite/"]
  requires_serialization: false
  notes:
    - Expands dotted JSON property names into nested containers per message.

omotel:
  paths: ["plugins/omotel/"]
  requires_serialization: false
  notes:
    - Transport resources are not yet active; introduce pData locking once they appear.

imbeats:
  paths: ["plugins/imbeats/"]
  requires_serialization: true
  locks:
    - type: mutex
      field: instanceConf.mutSessions
  notes:
    - Listener threads own readiness notification and worker threads process native Lumberjack session state.
    - Use Elastic Agent or Filebeat output.logstash to send Lumberjack v2 traffic to imbeats.
    - Concurrent Beats sessions are bounded per listener with maxSessions and processed through the listener worker/multiplexing path.
    - Use starvationProtection.maxReads to keep one busy sender from monopolizing imbeats worker time.
    - TLS deployments require an installed rsyslog TLS stream-driver package or module, such as rsyslog-gnutls or rsyslog-openssl.
    - The common Elastic Agent TLS setup validates the rsyslog server certificate but does not present a client certificate; use streamDriver.authMode=anon for that pattern and stricter auth modes only with sender client certificates.
    - Compressed Lumberjack v2 frames are supported and should be tested with Beats compression enabled.
    - A concrete sample container definition lives under packaging/docker/rsyslog/imbeats but is not wired into published container builds yet.
