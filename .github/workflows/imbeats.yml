---
name: imbeats tests

on:
  pull_request:
    paths:
      - 'tests/imbeats-*.sh'
      - 'tests/yaml-imbeats-*.sh'
      - 'runtime/*.[ch]'
      - 'tests/Makefile.am'
      - 'tests/diag.sh'
      - 'plugins/imbeats/**'
      - 'plugins/omelasticsearch/**'
      - 'configure.ac'
      - 'Makefile.am'
      - 'devtools/devcontainer.sh'
      - 'devtools/run-configure.sh'
      - 'devtools/run-ci.sh'
      - '.github/workflows/imbeats.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: >-
    ${{ github.workflow }}-${{
    github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RSYSLOG_TESTBENCH_BASE_SHA: >-
    ${{ github.event.pull_request.base.sha || github.sha }}
  RSYSLOG_TESTBENCH_HEAD_SHA: >-
    ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  imbeats_CI:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    name: imbeats-tests
    env:
      RSYSLOG_TESTBENCH_EXTERNAL_ES_URL: http://127.0.0.1:19200
      ES_HOST: 127.0.0.1
      ES_PORT: 19200
      DOCKER_RUN_EXTRA_OPTS: >-
        --network host
        -v /var/run/docker.sock:/var/run/docker.sock
        -e GITHUB_WORKSPACE
    steps:
      - name: checkout project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: cache configure results
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: config.cache
          key: >
            cfgcache-imbeats
            -cfg-${{ hashFiles('configure.ac','m4/*.m4','Makefile.am','.github/workflows/imbeats.yml','devtools/run-configure.sh','devtools/run-ci.sh') }}

      - name: run imbeats filebeat docker test
        env:
          RSYSLOG_DEV_CONTAINER: rsyslog/rsyslog_dev_base_ubuntu:22.04
          RSYSLOG_CONFIGURE_OPTIONS_OVERRIDE: >-
            --enable-testbench --enable-omstdout --enable-imdiag --enable-imbeats
            --enable-elasticsearch --enable-elasticsearch-tests
            --disable-default-tests --disable-imtcp-tests --disable-imfile
            --disable-imfile-tests --disable-fmhttp
          CI_MAKE_OPT: -j20
          CI_MAKE_CHECK_OPT: -j10
          CI_MAKE_CHECK_TESTS: >-
            imbeats-basic.sh
            imbeats-compressed.sh
            imbeats-limits.sh
            imbeats-limits-impstats.sh
            imbeats-maxsessions.sh
            imbeats-multiplex-idle-sessions.sh
            yaml-imbeats-basic.sh
            imbeats-filebeat-docker.sh
            imbeats-filebeat-omelasticsearch-docker.sh
          CI_CHECK_CMD: check
          ABORT_ALL_ON_TEST_FAIL: 'NO'
          CI_CONFIGURE_CACHE: '1'
          USE_AUTO_DEBUG: 'off'
          VERBOSE: '1'
        run: |
          docker rm -f rsyslog-imbeats-es >/dev/null 2>&1 || true
          docker run -d --rm \
            --name rsyslog-imbeats-es \
            -e discovery.type=single-node \
            -e xpack.security.enabled=false \
            -e ES_JAVA_OPTS="-Xms1g -Xmx1g" \
            -p 19200:9200 \
            docker.elastic.co/elasticsearch/elasticsearch:8.14.3
          trap 'docker rm -f rsyslog-imbeats-es >/dev/null 2>&1 || true' EXIT
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:19200/_cluster/health >/dev/null; then
              echo "Elasticsearch is ready"
              break
            fi
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "Elasticsearch service did not become ready in time"
              docker logs rsyslog-imbeats-es || true
              exit 1
            fi
          done
          chmod -R go+rw .
          devtools/devcontainer.sh --rm devtools/run-ci.sh
