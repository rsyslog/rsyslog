---
name: Spellcheck

'on':
  pull_request:

permissions:
  contents: read

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install codespell
        run: pip install codespell
      - name: Check spelling in docs
        run: |
          codespell doc/source
