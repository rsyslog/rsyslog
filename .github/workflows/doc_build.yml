name: documentation build

# This workflow runs on all pull requests because branch protection requires it.
# If no documentation files change, the build steps are skipped to save time.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.event_name }}-${{
    github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_docs:
    runs-on: ubuntu-latest
    outputs:
      docs_changed: ${{steps.doc_changes.outputs.any_changed}}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check for doc changes
        id: doc_changes
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            doc/**/*.rst
            doc/source/conf.py
            doc/tools/check-html-links.py
            doc/tools/fix-mermaid-offline.py

      # we build from tarball to ensure no missing files!
      - name: setup make dist build env
        if: >-
          ${{ github.event_name != 'pull_request' ||
          steps.doc_changes.outputs.any_changed == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libestr-dev \
            libglib2.0-dev \
            libgnutls28-dev \
            liblognorm-dev \
            liblz4-dev \
            libnet1-dev \
            librelp-dev \
            libssl-dev \
            libsystemd-dev \
            libtool \
            libtool-bin \
            libzstd-dev \
            lsof \
            make \
            net-tools \
            pkg-config \
            python3-docutils  \
            software-properties-common \
            zstd

      - name: create tarball
        if: >-
          ${{ github.event_name != 'pull_request' ||
          steps.doc_changes.outputs.any_changed == 'true' }}
        run: |
          autoreconf -fvi
          ./configure --enable-silent-rules --disable-testbench \
             --disable-imdiag --disable-imdocker --disable-imfile \
             --disable-default-tests --disable-impstats --disable-impstats-push --disable-imptcp \
             --disable-mmanon --disable-mmaudit --disable-mmfields \
             --disable-mmjsonparse --disable-mmpstrucdata \
             --disable-mmsequence --disable-mmutf8fix --disable-mail \
             --disable-omprog --disable-improg --disable-omruleset \
             --disable-omstdout --disable-omuxsock \
             --disable-pmaixforwardedfrom --disable-pmciscoios \
             --disable-pmcisconames --disable-pmlastmsg --disable-pmsnare \
             --disable-libgcrypt --disable-mmnormalize \
             --disable-omudpspoof --disable-relp --disable-mmsnmptrapd \
             --disable-gnutls --disable-usertools --disable-mysql \
             --disable-valgrind --disable-omjournal --enable-libsystemd \
             --disable-mmkubernetes --disable-imjournal \
             --disable-omkafka --disable-imkafka --disable-ommongodb \
             --disable-omrabbitmq --disable-journal-tests --disable-mmdarwin \
             --disable-helgrind --disable-uuid --disable-fmhttp
          make dist

      - name: unpack tarball for build
        if: >-
          ${{ github.event_name != 'pull_request' ||
          steps.doc_changes.outputs.any_changed == 'true' }}
        run: |
          mkdir doc-builder
          cd doc-builder
          tar -xf ../rsyslog-8*.tar.gz --strip-components=1
          pwd
          ls -l
          cd ..

      - name: Setup Python
        if: >-
          ${{ github.event_name != 'pull_request' ||
          steps.doc_changes.outputs.any_changed == 'true' }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Install Sphinx
        if: >-
          ${{ github.event_name != 'pull_request' ||
          steps.doc_changes.outputs.any_changed == 'true' }}
        run: python -m pip install -r doc/requirements.txt

      - name: Build documentation
        if: >-
          ${{ github.event_name != 'pull_request' ||
          steps.doc_changes.outputs.any_changed == 'true' }}
        run: |
          cd doc-builder
          ./configure --enable-silent-rules --disable-testbench \
             --disable-imdiag --disable-imdocker --disable-imfile \
             --disable-default-tests --disable-impstats --disable-impstats-push --disable-imptcp \
             --disable-mmanon --disable-mmaudit --disable-mmfields \
             --disable-mmjsonparse --disable-mmpstrucdata \
             --disable-mmsequence --disable-mmutf8fix --disable-mail \
             --disable-omprog --disable-improg --disable-omruleset \
             --disable-omstdout --disable-omuxsock \
             --disable-pmaixforwardedfrom --disable-pmciscoios \
             --disable-pmcisconames --disable-pmlastmsg --disable-pmsnare \
             --disable-libgcrypt --disable-mmnormalize \
             --disable-omudpspoof --disable-relp --disable-mmsnmptrapd \
             --disable-gnutls --disable-usertools --disable-mysql \
             --disable-valgrind --disable-omjournal --enable-libsystemd \
             --disable-mmkubernetes --disable-imjournal \
             --disable-omkafka --disable-imkafka --disable-ommongodb \
             --disable-omrabbitmq --disable-journal-tests --disable-mmdarwin \
             --disable-helgrind --disable-uuid --disable-fmhttp
          make -C doc html SPHINXOPTS="-j8 -W -q --keep-going"

      - name: Validate generated HTML links
        if: >-
          ${{ github.event_name != 'pull_request' ||
          steps.doc_changes.outputs.any_changed == 'true' }}
        run: |
          python3 doc/tools/check-html-links.py \
            doc-builder/doc/build \
            --check-root-absolute \
            --check-anchors

      - name: Build RAG Knowledge Base
        if: >-
          ${{ github.event_name != 'pull_request' ||
          steps.doc_changes.outputs.any_changed == 'true' }}
        run: |
          cd doc-builder/doc
          python3 build_rag_db.py
          # Verify the RAG database was created and has content
          test -f build/rag/rsyslog_rag_db.json
          chunk_count=$(python3 -c "import json; print(len(json.load(open('build/rag/rsyslog_rag_db.json'))))")
          echo "Generated $chunk_count RAG chunks"
          test "$chunk_count" -gt 10000

      - name: Upload build artifact
        if: >-
          ${{ github.event_name != 'pull_request' ||
          steps.doc_changes.outputs.any_changed == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-html
          path: doc-builder/doc/build

      - name: Upload RAG artifact
        if: >-
          ${{ github.event_name != 'pull_request' ||
          steps.doc_changes.outputs.any_changed == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rag-knowledge-base
          path: doc-builder/doc/build/rag/rsyslog_rag_db.json



  publish_pr_preview:
    name: Publish PR preview comment
    needs: build_docs
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event_name=='pull_request'&&
      github.event.action!='closed'&&
      needs.build_docs.outputs.docs_changed=='true'&&
      github.event.pull_request.head.repo.full_name==github.repository}}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Comment on PR with artifact links
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const repo = context.repo;
            const runId = context.runId;
            const commentBody = [
              '## 📖 Documentation Preview Ready!\n',
              '✅ **Sphinx docs built successfully for this PR.**\n',
              '### 📦 Download Documentation:',
              `- **Download HTML artifacts →** ` +
              'https://github.com/' + repo.owner + '/' + repo.repo +
              '/actions/runs/' + runId + '#artifacts',
              '',
              '### 🔗 Quick Links:',
              `- **View workflow run →** ` +
              'https://github.com/' + repo.owner + '/' + repo.repo +
              '/actions/runs/' + runId,
              '',
              '---',
              '*Note: PR workflows no longer publish to GitHub Pages ' +
              'because artifact-based Pages deployments overwrite the ' +
              'production docs site. Use the HTML artifact for preview.*',
              '*🤖 This comment was generated by the docs workflow.*'
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## 📖 Documentation Preview Ready!';
            const existing = comments.data.find(c =>
              typeof c.body === 'string' && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }
