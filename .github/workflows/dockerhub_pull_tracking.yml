---
name: dockerhub pull tracking

'on':
  schedule:
    # Every day at 06:15 UTC.
    - cron: '15 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Refresh Docker Hub pull-count CSVs
        run: packaging/docker/rsyslog/update-dockerhub-pull-counts.sh

      - name: Commit updated pull-count history
        run: |
          if git diff --quiet -- \
            packaging/docker/rsyslog/dockerhub_pull_counts_rsyslog.csv \
            packaging/docker/rsyslog/dockerhub_pull_counts_rsyslog_history.csv \
            packaging/docker/rsyslog/dockerhub_pull_counts_rsyslog_history.svg; then
            echo "No Docker Hub pull-count changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            packaging/docker/rsyslog/dockerhub_pull_counts_rsyslog.csv \
            packaging/docker/rsyslog/dockerhub_pull_counts_rsyslog_history.csv \
            packaging/docker/rsyslog/dockerhub_pull_counts_rsyslog_history.svg
          git commit -m \
            "ci: refresh Docker Hub pull-count history"
          git push origin "HEAD:${GITHUB_REF_NAME}"
